---
layout: default
---
<article class="post-card">
  {% if page.collection == "posts" %}
    <a class="back-link" href="/blog/">← Blog</a>
  {% else %}
    <a class="back-link" href="/reflections/{{ page.category }}/">← {{ page.category | capitalize }}</a>
  {% endif %}
  <h1>{{ page.title }}</h1>
  {% if page.date %}
  <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
  {% endif %}
  <div class="post-body">
    {{ content }}
  </div>
</article>
