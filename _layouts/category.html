---
layout: default
---
<div class="masthead">
  <div class="posts">
    <a class="back-link" href="/">← Home</a>
    <h2>{{ page.title }}</h2>
    <ul>
      {% assign posts = site.reflections
         | where: "category", page.category
         | sort: "date" | reverse %}
      {% for post in posts %}
        <li>
          <a href="{{ post.url }}">{{ post.title }}</a>
          {% if post.date %} — {{ post.date | date: "%b %-d, %Y" }}{% endif %}
        </li>
      {% endfor %}
    </ul>
  </div>
</div>
